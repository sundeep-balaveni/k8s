apiVersion: v1
kind: Pod
metadata:
  name: multicontainer
  namespace: roboshop

  labels:
    project: roboshop
    app: multicontainer
spec:
  containers: 
    - name: nginx
      image: nginx
      ports:
        - containerPort: 80


    - name: almalinux
      image: almalinux
      command: ["python3", "-m", "http.server", "8080"]
      ports:
        - containerPort: 8080


