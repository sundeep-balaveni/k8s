apiVersion: v1
kind: Pod
metadata:
  name: multicontainer
  namespace: roboshop
spec:
  containers: 
    - name: nginx
      image: nginx

    - name: almalinux
      image: almalinux
      command: ["sleep" , "1000"]
      envFrom:

  volumes:
